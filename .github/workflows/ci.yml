name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: black --check
        run: black --check src/pysoundmonitor tests
      - name: pylint
        run: pylint src/pysoundmonitor tests
      - name: pytest + coverage (> 85%)
        # Tunes are HVSC copyright works (never committed); the suite runs
        # OFFLINE against synthetic Soundmonitor-format fixtures. Any real-tune
        # test fetches from the HVSC mirror and skips cleanly when unreachable.
        run: pytest --cov=pysoundmonitor --cov-report=term-missing --cov-fail-under=85

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Smoke test the wheel
        run: |
          pip install dist/*.whl
          python -c "import pysoundmonitor; print(pysoundmonitor.__version__)"
          python -c "import pysoundmonitor"
