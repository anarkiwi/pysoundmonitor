name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: black --check
        run: black --check src/pysoundmonitor tests
      - name: pylint
        run: pylint src/pysoundmonitor tests
      - name: Cache HVSC test tunes
        # HVSC tunes are copyright works and are NEVER committed; they are
        # fetched from the HVSC mirror into the gitignored tunecache and cached
        # here across runs, keyed on the corpus list + fetch script.
        uses: actions/cache@v4
        with:
          path: tests/.tunecache
          key: hvsc-tunecache-${{ hashFiles('tests/test_corpus.py', 'scripts/fetch_tunes.py', 'tests/helpers.py') }}
          restore-keys: |
            hvsc-tunecache-
      - name: pytest + coverage (> 85%)
        # Synthetic Soundmonitor-format fixtures run offline; the HVSC corpus
        # tests FETCH their tunes from the HVSC mirror (cached above) and run.
        # An individual tune skips only if genuinely unreachable after retries.
        run: pytest --cov=pysoundmonitor --cov-report=term-missing --cov-fail-under=85

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Smoke test the wheel
        run: |
          pip install dist/*.whl
          python -c "import pysoundmonitor; print(pysoundmonitor.__version__)"
          python -c "import pysoundmonitor"
